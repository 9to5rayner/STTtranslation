name: Android CI / Cloud Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Bootstrap Gradle & Fix Wrapper
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -O gradle.zip
        unzip -q gradle.zip
        ./gradle-8.11.1/bin/gradle wrapper --gradle-version 8.11.1
        sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.11.1-bin.zip|' gradle/wrapper/gradle-wrapper.properties
        chmod +x gradlew

    - name: Generate placeholder launcher icons
      run: |
        python3 - <<'EOF'
        import struct, zlib, os

        def make_png(size, color):
            def chunk(name, data):
                c = struct.pack('>I', len(data)) + name + data
                return c + struct.pack('>I', zlib.crc32(c[4:]) & 0xffffffff)
            
            r, g, b = color
            raw = b''
            for _ in range(size):
                row = b'\x00' + bytes([r, g, b] * size)
                raw += row
            
            sig = b'\x89PNG\r\n\x1a\n'
            ihdr = struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0)
            idat = zlib.compress(raw)
            
            return sig + chunk(b'IHDR', ihdr) + chunk(b'IDAT', idat) + chunk(b'IEND', b'')

        png = make_png(48, (76, 175, 80))
        for dpi in ['mdpi','hdpi','xhdpi','xxhdpi','xxxhdpi']:
            path = f'app/src/main/res/mipmap-{dpi}'
            os.makedirs(path, exist_ok=True)
            for name in ['ic_launcher.png', 'ic_launcher_round.png']:
                with open(f'{path}/{name}', 'wb') as f:
                    f.write(png)
        print("Icons generated!")
        EOF

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: groq-transcriber-app
        path: app/build/outputs/apk/debug/app-debug.apk