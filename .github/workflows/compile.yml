            '            android:padding="4dp"/>\n'
            '    </ScrollView>\n'
            '\n'
            '    <Button\n'
            '        android:id="@+id/btnShareTxt"\n'
            '        android:layout_width="match_parent"\n'
            '        android:layout_height="wrap_content"\n'
            '        android:layout_marginTop="8dp"\n'
            '        android:text="Share as TXT"/>\n'
            '\n'
            '    <Button\n'
            '        android:id="@+id/btnShareSrt"\n'
            '        android:layout_width="match_parent"\n'
            '        android:layout_height="wrap_content"\n'
            '        android:text="Share as SRT"/>\n'
            '\n'
            '    <Button\n'
            '        android:id="@+id/btnCopy"\n'
            '        android:layout_width="match_parent"\n'
            '        android:layout_height="wrap_content"\n'
            '        android:text="Copy to Clipboard"/>\n'
            '\n'
            '</LinearLayout>\n'
        )

        files['app/src/main/res/layout/item_transcript_entry.xml'] = (
            '<?xml version="1.0" encoding="utf-8"?>\n'
            '<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"\n'
            '    android:layout_width="match_parent"\n'
            '    android:layout_height="wrap_content"\n'
            '    android:orientation="vertical"\n'
            '    android:background="@android:color/white"\n'
            '    android:padding="10dp"\n'
            '    android:layout_marginBottom="6dp"\n'
            '    android:elevation="2dp">\n'
            '\n'
            '    <LinearLayout\n'
            '        android:layout_width="match_parent"\n'
            '        android:layout_height="wrap_content"\n'
            '        android:orientation="horizontal">\n'
            '\n'
            '        <TextView\n'
            '            android:id="@+id/tvTimestamp"\n'
            '            android:layout_width="0dp"\n'
            '            android:layout_height="wrap_content"\n'
            '            android:layout_weight="1"\n'
            '            android:textSize="11sp"\n'
            '            android:textColor="#999999"/>\n'
            '\n'
            '        <TextView\n'
            '            android:id="@+id/tvEditHint"\n'
            '            android:layout_width="wrap_content"\n'
            '            android:layout_height="wrap_content"\n'
            '            android:text="tap to edit"\n'
            '            android:textSize="11sp"\n'
            '            android:textColor="#6200EE"/>\n'
            '    </LinearLayout>\n'
            '\n'
            '    <TextView\n'
            '        android:id="@+id/tvOriginal"\n'
            '        android:layout_width="match_parent"\n'
            '        android:layout_height="wrap_content"\n'
            '        android:textSize="14sp"\n'
            '        android:textStyle="bold"\n'
            '        android:textColor="#1C1C1E"\n'
            '        android:layout_marginTop="4dp"/>\n'
            '\n'
            '    <TextView\n'
            '        android:id="@+id/tvTranslation"\n'
            '        android:layout_width="match_parent"\n'
            '        android:layout_height="wrap_content"\n'
            '        android:textSize="13sp"\n'
            '        android:textColor="#3A3A3C"\n'
            '        android:layout_marginTop="2dp"/>\n'
            '\n'
            '    <TextView\n'
            '        android:id="@+id/tvRetranslating"\n'
            '        android:layout_width="match_parent"\n'
            '        android:layout_height="wrap_content"\n'
            '        android:text="Re-translating..."\n'
            '        android:textSize="12sp"\n'
            '        android:textColor="#888888"\n'
            '        android:visibility="gone"\n'
            '        android:layout_marginTop="4dp"/>\n'
            '\n'
            '</LinearLayout>\n'
        )

        for path, content in files.items():
            os.makedirs(os.path.dirname(path), exist_ok=True)
            with open(path, 'w', encoding='utf-8', newline='\n') as f:
                f.write(content)
            # Verify no BOM was written
            with open(path, 'rb') as f:
                first3 = f.read(3)
            assert first3 == b'<?x', f"Bad start bytes in {path}: {first3.hex()}"
            print(f"OK: {path}")

        print("All layout files written cleanly.")
        EOF

    - name: Generate placeholder launcher icons
      run: |
        python3 - <<'EOF'
        import struct, zlib, os

        def make_png(size, color):
            def chunk(name, data):
                c = struct.pack('>I', len(data)) + name + data
                return c + struct.pack('>I', zlib.crc32(c[4:]) & 0xffffffff)
            r, g, b = color
            raw = b''
            for _ in range(size):
                row = b'\x00' + bytes([r, g, b] * size)
                raw += row
            sig = b'\x89PNG\r\n\x1a\n'
            ihdr = struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0)
            idat = zlib.compress(raw)
            return sig + chunk(b'IHDR', ihdr) + chunk(b'IDAT', idat) + chunk(b'IEND', b'')

        png = make_png(48, (76, 175, 80))
        for dpi in ['mdpi','hdpi','xhdpi','xxhdpi','xxxhdpi']:
            path = f'app/src/main/res/mipmap-{dpi}'
            os.makedirs(path, exist_ok=True)
            for name in ['ic_launcher.png', 'ic_launcher_round.png']:
                with open(f'{path}/{name}', 'wb') as f:
                    f.write(png)
        print("Icons generated!")
        EOF

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: groq-transcriber-app
        path: app/build/outputs/apk/debug/app-debug.apk
