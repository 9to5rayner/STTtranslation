name: Android CI / Cloud Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Bootstrap Gradle & Fix Wrapper
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -O gradle.zip
        unzip -q gradle.zip
        ./gradle-8.11.1/bin/gradle wrapper --gradle-version 8.11.1
        sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.11.1-bin.zip|' gradle/wrapper/gradle-wrapper.properties
        chmod +x gradlew

    - name: Write layout XML files (guaranteed clean UTF-8, no BOM)
      run: |
        python3 - <<'EOF'
        import os

        files = {}

        files['app/src/main/res/layout/activity_recording.xml'] = (
            '<?xml version="1.0" encoding="utf-8"?>\n'
            '<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"\n'
            '    android:layout_width="match_parent"\n'
            '    android:layout_height="match_parent"\n'
            '    android:orientation="vertical"\n'
            '    android:padding="16dp">\n'
            '\n'
            '    <TextView\n'
            '        android:id="@+id/tvStatus"\n'
            '        android:layout_width="match_parent"\n'
            '        android:layout_height="wrap_content"\n'
            '        android:text="Recording active..."\n'
            '        android:textSize="18sp"\n'
            '        android:textStyle="bold"\n'
            '        android:gravity="center"\n'
            '        android:layout_marginBottom="16dp"/>\n'
            '\n'
            '    <LinearLayout\n'
            '        android:layout_width="match_parent"\n'
            '        android:layout_height="wrap_content"\n'
            '        android:orientation="horizontal"\n'
            '        android:weightSum="2"\n'
            '        android:layout_marginBottom="10dp">\n'
            '\n'
            '        <Button\n'
            '            android:id="@+id/btnPause"\n'
            '            android:layout_width="0dp"\n'
            '            android:layout_height="wrap_content"\n'
            '            android:layout_weight="1"\n'
            '            android:layout_marginEnd="4dp"\n'
            '            android:text="Pause Session"/>\n'
            '\n'
            '        <Button\n'
            '            android:id="@+id/btnSkip"\n'
            '            android:layout_width="0dp"\n'
            '            android:layout_height="wrap_content"\n'
            '            android:layout_weight="1"\n'
            '            android:layout_marginStart="4dp"\n'
            '            android:text="Skip Song"/>\n'
            '    </LinearLayout>\n'
            '\n'
            '    <Button\n'
            '        android:id="@+id/btnEnd"\n'
            '        android:layout_width="match_parent"\n'
            '        android:layout_height="wrap_content"\n'
            '        android:backgroundTint="#FF3B30"\n'
            '        android:text="End Session"\n'
            '        android:layout_marginBottom="8dp"/>\n'
            '\n'
            '    <TextView\n'
            '        android:layout_width="match_parent"\n'
            '        android:layout_height="wrap_content"\n'
            '        android:text="Tap any entry to edit"\n'
            '        android:textSize="11sp"\n'
            '        android:textColor="#888888"\n'
            '        android:gravity="center"\n'
            '        android:layout_marginBottom="6dp"/>\n'
            '\n'
            '    <androidx.recyclerview.widget.RecyclerView\n'
            '        android:id="@+id/rvTranscriptLog"\n'
            '        android:layout_width="match_parent"\n'
            '        android:layout_height="0dp"\n'
            '        android:layout_weight="1"\n'
            '        android:background="#F2F2F7"\n'
            '        android:clipToPadding="false"\n'
            '        android:padding="4dp"/>\n'
            '\n'
            '</LinearLayout>\n'
        )

        files['app/src/main/res/layout/activity_export.xml'] = (
            '<?xml version="1.0" encoding="utf-8"?>\n'
            '<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"\n'
            '    android:layout_width="match_parent"\n'
            '    android:layout_height="match_parent"\n'
            '    android:orientation="vertical"\n'
            '    android:padding="16dp">\n'
            '\n'
            '    <TextView\n'
            '        android:layout_width="match_parent"\n'
            '        android:layout_height="wrap_content"\n'
            '        android:text="Session Transcript"\n'
            '        android:textSize="18sp"\n'
            '        android:textStyle="bold"\n'
            '        android:layout_marginBottom="4dp"/>\n'
            '\n'
            '    <TextView\n'
            '        android:layout_width="match_parent"\n'
            '        android:layout_height="wrap_content"\n'
            '        android:text="Tap any entry to edit transcription and re-translate."\n'
            '        android:textSize="12sp"\n'
            '        android:textColor="#888888"\n'
            '        android:layout_marginBottom="8dp"/>\n'
            '\n'
            '    <ScrollView\n'
            '        android:layout_width="match_parent"\n'
            '        android:layout_height="0dp"\n'
            '        android:layout_weight="1"\n'
            '        android:background="#F2F2F7"\n'
            '        android:padding="4dp">\n'
            '\n'
            '        <LinearLayout\n'
            '            android:id="@+id/llEntriesContainer"\n'
            '            android:layout_width="match_parent"\n'
            '            android:layout_height="wrap_content"\n'
