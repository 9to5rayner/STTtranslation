name: Android CI / Cloud Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # Diagnoses your repository paths so we can see exactly where files live in case of a mismatch
    - name: Diagnose File Map Structure
      run: |
        echo "=== Checking Root Directory ==="
        ls -la
        echo "=== Checking App Directory ==="
        ls -la app || echo "App folder not found at root!"

    # Generates a fresh Gradle wrapper matching the cloud runner's modern system
    - name: Natively Build Gradle Wrapper Files
      run: gradle wrapper

    # Wipes out potential text formatting artifacts from web browser copy-pasting
    - name: Fix line endings and permissions for gradlew
      run: |
        sudo apt-get install -y dos2unix
        dos2unix gradlew
        chmod +x gradlew

    # Compiles the app module directly
    - name: Build Debug APK
      run: ./gradlew :app:assembleDebug --stacktrace

    # Saves your finished app installer as a downloadable ZIP package
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: groq-transcriber-app
        path: app/build/outputs/apk/debug/app-debug.apk