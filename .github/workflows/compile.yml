name: Android CI / Cloud Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Uses the latest v4 to stay completely compatible with Node 24+
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Fix line endings and permissions for gradlew
      run: |
        sudo apt-get install -y dos2unix
        dos2unix gradlew
        chmod +x gradlew

# Change this line inside your compile.yml file:
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: groq-transcriber-app
        path: app/build/outputs/apk/debug/app-debug.apk