name: Android CI / Cloud Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # This magic step builds a fresh, uncorrupted Gradle Wrapper engine directly on the server
    - name: Generate Gradle Wrapper Engine
      run: jar cfe gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain -C . . || gradle wrapper --gradle-version 8.2.2

    - name: Fix line endings and permissions for gradlew
      run: |
        sudo apt-get install -y dos2unix
        dos2unix gradlew
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: groq-transcriber-app
        path: app/build/outputs/apk/debug/app-debug.apk