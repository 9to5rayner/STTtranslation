name: Android CI / Cloud Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Bootstrap Gradle & Fix Wrapper
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -O gradle.zip
        unzip -q gradle.zip
        ./gradle-8.11.1/bin/gradle wrapper --gradle-version 8.11.1
        sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.11.1-bin.zip|' gradle/wrapper/gradle-wrapper.properties
        chmod +x gradlew

    - name: Generate placeholder launcher icons
      run: |
        for dpi in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
          mkdir -p app/src/main/res/mipmap-${dpi}
          convert -size 48x48 xc:#4CAF50 \
            app/src/main/res/mipmap-${dpi}/ic_launcher.png
          cp app/src/main/res/mipmap-${dpi}/ic_launcher.png \
            app/src/main/res/mipmap-${dpi}/ic_launcher_round.png
        done

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: groq-transcriber-app
        path: app/build/outputs/apk/debug/app-debug.apk