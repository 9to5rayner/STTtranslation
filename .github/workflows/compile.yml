name: Android CI / Cloud Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Bootstrap Gradle 8.2.2 & Generate Wrapper
      run: |
        curl -L https://services.gradle.org/distributions/gradle-8.2.2-bin.zip -o gradle.zip
        unzip -q gradle.zip
        ./gradle-8.2.2/bin/gradle wrapper --gradle-version 8.2.2
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: groq-transcriber-app
        path: app/build/outputs/apk/debug/app-debug.apk